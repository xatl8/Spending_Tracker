<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Group Spending Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #ddd; }
  .tab { padding: 8px 18px; font-size: 14px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
  .tab.active { color: #1a1a18; border-bottom: 2px solid #1a1a18; font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 8px 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a18; font-family: inherit; }
  .field input:focus, .field select:focus { outline: none; border-color: #999; }
  .field input:disabled { opacity: 0.5; background: #f5f5f3; }
  .split-header { display: grid; grid-template-columns: 90px 1fr 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .split-row { display: grid; grid-template-columns: 90px 1fr 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .split-row input { text-align: right; padding: 6px 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
  .split-total { font-size: 13px; color: #888; margin-bottom: 8px; }
  .split-total span { font-weight: 500; color: #1a1a18; }
  .err { font-size: 12px; color: #a32d2d; margin-bottom: 8px; display: none; }
  .btn { padding: 8px 16px; font-size: 13px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; color: #1a1a18; font-family: inherit; }
  .btn:hover { background: #f5f5f3; }
  .btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; font-size: 14px; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-del { color: #a32d2d; border-color: #f7c1c1; }
  .btn-del:hover { background: #fcebeb; }
  .expense-item { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
  .expense-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .expense-desc { font-size: 14px; font-weight: 500; }
  .expense-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .expense-right { text-align: right; flex-shrink: 0; }
  .expense-amount { font-size: 15px; font-weight: 500; }
  .expense-sgd { font-size: 11px; color: #888; }
  .expense-splits { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .split-pill { font-size: 11px; padding: 3px 8px; border-radius: 99px; background: #f5f5f3; color: #666; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 500; margin-left: 4px; }
  .b-sgd { background: #e1f5ee; color: #0f6e56; }
  .b-jpy { background: #e6f1fb; color: #185fa5; }
  .b-myr { background: #faeeda; color: #854f0b; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #f5f5f3; border-radius: 10px; padding: 12px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .person-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .person-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .av-l { background: #e1f5ee; color: #0f6e56; }
  .av-j { background: #e6f1fb; color: #185fa5; }
  .av-k { background: #faeeda; color: #854f0b; }
  .person-name { font-size: 14px; font-weight: 500; }
  .person-net { font-size: 12px; margin-top: 2px; }
  .pos { color: #0f6e56; } .neg { color: #a32d2d; } .zero { color: #888; }
  .bal-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-top: 1px solid #f0f0ec; }
  .bal-label { color: #888; }
  .cur-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0ec; }
  .cur-section-title { font-size: 11px; color: #888; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .cur-detail-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; padding: 3px 0; }
  .settle-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .settle-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f5f5f3; border-radius: 10px; margin-bottom: 8px; font-size: 13px; }
  .settle-arrow { color: #aaa; margin: 0 6px; }
  .empty { text-align: center; padding: 2.5rem; color: #888; font-size: 14px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-row select { font-size: 13px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-family: inherit; }
  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; margin-bottom: 1rem; padding: 8px 12px; background: #f5f5f3; border-radius: 8px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: #1d9e75; }
  .dot-err { background: #e24b4a; }
  .dot-loading { background: #ef9f27; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a18; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .split-header, .split-row { grid-template-columns: 70px 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Group Spending Tracker</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add',this)">Add expense</button>
    <button class="tab" onclick="switchTab('expenses',this)">Expenses</button>
    <button class="tab" onclick="switchTab('balances',this)">Balances</button>
    <button class="tab" onclick="switchTab('settings',this)">Rates</button>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="section active">
    <div class="sync-bar">
      <div class="sync-dot dot-loading" id="syncDot"></div>
      <span id="syncMsg">Connecting to cloud...</span>
      <button class="btn btn-sm" onclick="loadData()" style="margin-left:auto;">Refresh</button>
    </div>
    <div class="card">
      <div class="form-row">
        <div class="field"><label>Description</label><input type="text" id="desc" placeholder="e.g. Dinner at Dotonbori" /></div>
        <div class="field"><label>Paid by</label><select id="paidBy"><option>Leonard</option><option>JS</option><option>Kyo</option></select></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Amount</label><input type="number" id="amount" placeholder="0.00" min="0" step="0.01" oninput="onAmountChange()" /></div>
        <div class="field"><label>Currency</label><select id="currency" onchange="onAmountChange()"><option value="SGD">SGD (S$)</option><option value="JPY">JPY (¥)</option><option value="MYR">MYR (RM)</option></select></div>
      </div>
      <div class="field" style="margin-bottom:12px;"><label>Date</label><input type="date" id="date" /></div>
      <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Split</div>
      <div class="split-header">
        <span></span>
        <span style="font-size:12px;color:#888;text-align:center;">Leonard</span>
        <span style="font-size:12px;color:#888;text-align:center;">JS</span>
        <span style="font-size:12px;color:#888;text-align:center;">Kyo</span>
      </div>
      <div class="split-row">
        <span style="font-size:13px;color:#888;">Amount</span>
        <input type="number" id="s0" placeholder="0" min="0" step="0.01" oninput="checkSplit()" />
        <input type="number" id="s1" placeholder="0" min="0" step="0.01" oninput="checkSplit()" />
        <input type="number" id="s2" placeholder="0" min="0" step="0.01" oninput="checkSplit()" />
      </div>
      <div class="split-total" id="splitTotal"></div>
      <div class="err" id="splitError"></div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn btn-sm" onclick="splitEqual()">Split equally</button>
        <button class="btn btn-sm" onclick="splitPayer()">Payer covers all</button>
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="addExpense()" style="width:100%;">Add expense</button>
      <div class="err" id="formError" style="margin-top:8px;"></div>
    </div>
  </div>

  <!-- EXPENSES -->
  <div id="tab-expenses" class="section">
    <div class="filter-row">
      <select id="filterCur" onchange="renderExpenses()"><option value="ALL">All currencies</option><option value="SGD">SGD only</option><option value="JPY">JPY only</option><option value="MYR">MYR only</option></select>
      <select id="filterPaid" onchange="renderExpenses()"><option value="ALL">All payers</option><option>Leonard</option><option>JS</option><option>Kyo</option></select>
    </div>
    <div id="expenseList"></div>
  </div>

  <!-- BALANCES -->
  <div id="tab-balances" class="section">
    <div class="summary-grid" id="summaryGrid"></div>
    <div id="balanceCards"></div>
    <div id="settleSection" style="display:none;margin-top:1.5rem;">
      <div class="settle-title">Suggested settlements (SGD)</div>
      <div id="settleItems"></div>
    </div>
    <div id="emptyBal" class="empty" style="display:none;">No expenses yet.</div>
  </div>

  <!-- SETTINGS -->
  <div id="tab-settings" class="section">
    <div class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:4px;">Exchange rates to SGD</div>
      <div style="font-size:13px;color:#888;margin-bottom:14px;">Balances recalculate automatically when you update these.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
        <div class="field"><label>1 JPY = S$</label><input type="number" id="rateJPY" step="0.0001" min="0.0001" oninput="updateRates()" /></div>
        <div class="field"><label>1 MYR = S$</label><input type="number" id="rateMYR" step="0.001" min="0.001" oninput="updateRates()" /></div>
        <div class="field"><label>1 SGD = S$</label><input type="number" value="1.00" disabled /></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:10px;">Danger zone</div>
      <button class="btn btn-del" onclick="clearAll()">Clear all expenses</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = '$2a$10$sma/aUHTO/.TWCnQIRmgeeXg8mnr3xUzN8Ywg8TDVxvbutFTJPZ9u';
const BIN_KEY = 'gtracker_binid_v1';
const BASE = 'https://api.jsonbin.io/v3/b';
const names = ['Leonard','JS','Kyo'];
const avClass = ['av-l','av-j','av-k'];
const initials = ['LE','JS','KY'];
const curSymbol = { SGD:'S$', JPY:'¥', MYR:'RM' };
const curDp = { SGD:2, JPY:0, MYR:2 };

let expenses = [];
let rates = { SGD:1.0, JPY:0.0088, MYR:0.30 };
let binId = '69ba84bbb7ec241ddc7c5237';
let saving = false;

function setSync(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + (state==='ok'?'dot-ok':state==='err'?'dot-err':'dot-loading');
  document.getElementById('syncMsg').textContent = msg;
}

async function loadData() {
  setSync('loading','Syncing...');
  try {
    if (!binId) { await createBin(); return; }
    const res = await fetch(`${BASE}/${binId}/latest`, { headers: { 'X-Master-Key': API_KEY } });
    if (res.status === 404) { binId = null; localStorage.removeItem(BIN_KEY); await createBin(); return; }
    const data = await res.json();
    const rec = data.record;
    expenses = rec.expenses || [];
    rates = rec.rates || rates;
    document.getElementById('rateJPY').value = rates.JPY;
    document.getElementById('rateMYR').value = rates.MYR;
    setSync('ok', `Synced · ${expenses.length} expense${expenses.length!==1?'s':''}`);
  } catch(e) { setSync('err','Sync failed — check connection'); }
}

async function createBin() {
  setSync('loading','Creating cloud bin...');
  try {
    const res = await fetch(BASE, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Name':'Group Spending Tracker', 'X-Bin-Private':'true' },
      body: JSON.stringify({ expenses:[], rates })
    });
    const data = await res.json();
    binId = data.metadata.id;
    localStorage.setItem(BIN_KEY, binId);
    setSync('ok','Cloud bin created · Ready');
  } catch(e) { setSync('err','Could not create bin'); }
}

async function saveData() {
  if (!binId || saving) return;
  saving = true;
  setSync('loading','Saving...');
  try {
    await fetch(`${BASE}/${binId}`, {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Versioning':'false' },
      body: JSON.stringify({ expenses, rates })
    });
    setSync('ok',`Saved · ${expenses.length} expense${expenses.length!==1?'s':''}`);
  } catch(e) { setSync('err','Save failed'); }
  saving = false;
}

function switchTab(t, el) {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='expenses') renderExpenses();
  if(t==='balances') renderBalances();
  if(t==='settings') { document.getElementById('rateJPY').value=rates.JPY; document.getElementById('rateMYR').value=rates.MYR; }
}

function fmt(amount, currency) {
  return curSymbol[currency] + (curDp[currency]===0 ? Math.round(amount).toLocaleString() : amount.toFixed(curDp[currency]));
}
function toSGD(amount, currency) { return amount * (rates[currency]||1); }

function onAmountChange() {
  const amt = parseFloat(document.getElementById('amount').value)||0;
  const cur = document.getElementById('currency').value;
  [0,1,2].forEach(i=>{ document.getElementById('s'+i).value = amt>0?(amt/3).toFixed(curDp[cur]):''; });
  checkSplit();
}
function splitEqual() {
  const amt = parseFloat(document.getElementById('amount').value)||0;
  const cur = document.getElementById('currency').value;
  [0,1,2].forEach(i=>{ document.getElementById('s'+i).value=(amt/3).toFixed(curDp[cur]); });
  checkSplit();
}
function splitPayer() {
  const payer = document.getElementById('paidBy').value;
  const amt = parseFloat(document.getElementById('amount').value)||0;
  const cur = document.getElementById('currency').value;
  names.forEach((n,i)=>{ document.getElementById('s'+i).value=n===payer?amt.toFixed(curDp[cur]):'0'; });
  checkSplit();
}
function checkSplit() {
  const amt = parseFloat(document.getElementById('amount').value)||0;
  const cur = document.getElementById('currency').value;
  const splits = [0,1,2].map(i=>parseFloat(document.getElementById('s'+i).value)||0);
  const total = splits.reduce((a,b)=>a+b,0);
  document.getElementById('splitTotal').innerHTML='Split total: <span>'+fmt(total,cur)+'</span> of <span>'+fmt(amt,cur)+'</span>';
  const err = document.getElementById('splitError');
  if(amt>0&&Math.abs(total-amt)>0.05){err.style.display='block';err.textContent='Split must equal total.';}
  else err.style.display='none';
}

async function addExpense() {
  const desc = document.getElementById('desc').value.trim();
  const paidBy = document.getElementById('paidBy').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const currency = document.getElementById('currency').value;
  const date = document.getElementById('date').value;
  const splits = [0,1,2].map(i=>parseFloat(document.getElementById('s'+i).value)||0);
  const total = splits.reduce((a,b)=>a+b,0);
  const err = document.getElementById('formError');
  if(!desc){err.style.display='block';err.textContent='Please enter a description.';return;}
  if(!amount||amount<=0){err.style.display='block';err.textContent='Please enter a valid amount.';return;}
  if(Math.abs(total-amount)>0.05){err.style.display='block';err.textContent='Split amounts must add up to total.';return;}
  err.style.display='none';
  const btn = document.getElementById('addBtn');
  btn.disabled=true; btn.textContent='Saving...';
  expenses.push({ id:Date.now(), desc, paidBy, amount, currency, date:date||new Date().toISOString().slice(0,10), splits });
  await saveData();
  document.getElementById('desc').value=''; document.getElementById('amount').value='';
  [0,1,2].forEach(i=>{ document.getElementById('s'+i).value=''; });
  document.getElementById('splitTotal').innerHTML='';
  btn.disabled=false; btn.textContent='Add expense';
  toast('Expense saved to cloud!');
}

async function deleteExpense(id) {
  if(!confirm('Delete this expense?')) return;
  expenses = expenses.filter(e=>e.id!==id);
  await saveData();
  renderExpenses();
  toast('Expense deleted.');
}

function renderExpenses() {
  const fc = document.getElementById('filterCur').value;
  const fp = document.getElementById('filterPaid').value;
  let list = expenses.slice().reverse();
  if(fc!=='ALL') list=list.filter(e=>e.currency===fc);
  if(fp!=='ALL') list=list.filter(e=>e.paidBy===fp);
  const el = document.getElementById('expenseList');
  if(!list.length){el.innerHTML='<div class="empty">No expenses match your filter.</div>';return;}
  el.innerHTML=list.map(e=>{
    const sgdEq=toSGD(e.amount,e.currency);
    const pills=names.map((n,i)=>`<span class="split-pill">${n}: ${fmt(e.splits[i],e.currency)}</span>`).join('');
    return `<div class="expense-item">
      <div class="expense-top">
        <div><div class="expense-desc">${e.desc}</div><div class="expense-meta">${e.date} · Paid by <strong>${e.paidBy}</strong></div></div>
        <div class="expense-right">
          <div class="expense-amount">${fmt(e.amount,e.currency)}<span class="badge b-${e.currency.toLowerCase()}">${e.currency}</span></div>
          ${e.currency!=='SGD'?`<div class="expense-sgd">≈ S$${sgdEq.toFixed(2)}</div>`:''}
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <div class="expense-splits">${pills}</div>
        <button class="btn btn-sm btn-del" onclick="deleteExpense(${e.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderBalances() {
  const empty=document.getElementById('emptyBal');
  if(!expenses.length){document.getElementById('summaryGrid').innerHTML='';document.getElementById('balanceCards').innerHTML='';empty.style.display='block';document.getElementById('settleSection').style.display='none';return;}
  empty.style.display='none';
  const totalSGD=expenses.reduce((s,e)=>s+toSGD(e.amount,e.currency),0);
  const usedCurs=[...new Set(expenses.map(e=>e.currency))];
  document.getElementById('summaryGrid').innerHTML=`
    <div class="metric"><div class="metric-label">Total (SGD)</div><div class="metric-value">S$${totalSGD.toFixed(2)}</div><div class="metric-sub">${expenses.length} expense${expenses.length!==1?'s':''}</div></div>
    <div class="metric"><div class="metric-label">Per person</div><div class="metric-value">S$${(totalSGD/3).toFixed(2)}</div><div class="metric-sub">equal share</div></div>
    <div class="metric"><div class="metric-label">Currencies</div><div class="metric-value" style="font-size:14px;padding-top:4px;">${usedCurs.map(c=>`<span class="badge b-${c.toLowerCase()}">${c}</span>`).join(' ')}</div></div>`;
  const paid={}; const owed={}; const paidByCur={}; const owedByCur={};
  names.forEach(n=>{paid[n]=0;owed[n]=0;paidByCur[n]={};owedByCur[n]={};});
  expenses.forEach(e=>{
    paid[e.paidBy]+=toSGD(e.amount,e.currency);
    paidByCur[e.paidBy][e.currency]=(paidByCur[e.paidBy][e.currency]||0)+e.amount;
    names.forEach((n,i)=>{owed[n]+=toSGD(e.splits[i],e.currency);owedByCur[n][e.currency]=(owedByCur[n][e.currency]||0)+e.splits[i];});
  });
  const net={}; names.forEach(n=>{net[n]=paid[n]-owed[n];});
  document.getElementById('balanceCards').innerHTML=names.map((n,idx)=>{
    const nv=net[n]; const nc=nv>0.01?'pos':nv<-0.01?'neg':'zero';
    const nl=nv>0.01?`gets back S$${Math.abs(nv).toFixed(2)}`:nv<-0.01?`owes S$${Math.abs(nv).toFixed(2)}`:'settled up';
    const curRows=usedCurs.map(c=>{
      const p=paidByCur[n][c]||0; const o=owedByCur[n][c]||0; const cv=p-o;
      if(p===0&&o===0) return '';
      return `<div class="cur-detail-row"><span>${c}: paid ${fmt(p,c)}, share ${fmt(o,c)}</span><span class="${cv>0.01?'pos':cv<-0.01?'neg':'zero'}">${cv>=0?'+':''}${fmt(cv,c)}</span></div>`;
    }).join('');
    return `<div class="person-card">
      <div class="person-header"><div class="avatar ${avClass[idx]}">${initials[idx]}</div><div><div class="person-name">${n}</div><div class="person-net ${nc}">${nl}</div></div></div>
      <div class="bal-row"><span class="bal-label">Total paid (SGD)</span><span>S$${paid[n].toFixed(2)}</span></div>
      <div class="bal-row"><span class="bal-label">Total share (SGD)</span><span>S$${owed[n].toFixed(2)}</span></div>
      <div class="bal-row" style="font-weight:500"><span class="bal-label">Net</span><span class="${nc}">${nv>=0?'+':''}S$${nv.toFixed(2)}</span></div>
      ${curRows?`<div class="cur-section"><div class="cur-section-title">By currency</div>${curRows}</div>`:''}
    </div>`;
  }).join('');
  const bal={...net}; const debts=[];
  const dList=names.filter(n=>bal[n]<-0.01).map(n=>({name:n,amt:-bal[n]}));
  const cList=names.filter(n=>bal[n]>0.01).map(n=>({name:n,amt:bal[n]}));
  let di=0,ci=0;
  while(di<dList.length&&ci<cList.length){
    const pay=Math.min(dList[di].amt,cList[ci].amt);
    if(pay>0.01) debts.push({from:dList[di].name,to:cList[ci].name,amt:pay});
    dList[di].amt-=pay; cList[ci].amt-=pay;
    if(dList[di].amt<0.01)di++; if(cList[ci].amt<0.01)ci++;
  }
  const ss=document.getElementById('settleSection');
  if(debts.length){ss.style.display='block';document.getElementById('settleItems').innerHTML=debts.map(d=>`<div class="settle-item"><span><strong>${d.from}</strong><span class="settle-arrow">→</span><strong>${d.to}</strong></span><span style="font-weight:500">S$${d.amt.toFixed(2)}</span></div>`).join('');}
  else ss.style.display='none';
}

async function updateRates() {
  rates.JPY=parseFloat(document.getElementById('rateJPY').value)||0.0088;
  rates.MYR=parseFloat(document.getElementById('rateMYR').value)||0.30;
  await saveData();
}

async function clearAll() {
  if(!confirm('Delete ALL expenses? This cannot be undone.')) return;
  expenses=[]; await saveData(); renderExpenses(); toast('All expenses cleared.');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},2500);
}

document.getElementById('date').value=new Date().toISOString().slice(0,10);
document.getElementById('rateJPY').value=rates.JPY;
document.getElementById('rateMYR').value=rates.MYR;
loadData();
</script>
